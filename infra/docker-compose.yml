# Local development infrastructure for Avenue Grill.
#   docker compose -f infra/docker-compose.yml up -d
#
# Provides PostgreSQL (the app's database) and Adminer (a lightweight DB UI).
# Credentials here are LOCAL DEV ONLY — production uses managed Postgres with secrets.

services:
  postgres:
    image: postgres:16-alpine
    container_name: avenuegrill-postgres
    environment:
      POSTGRES_DB: avenuegrill
      POSTGRES_USER: avenuegrill
      POSTGRES_PASSWORD: avenuegrill
    # Host port 5434 (not the default 5432) to avoid clashing with other local
    # Postgres instances. The container still listens on 5432 internally.
    ports:
      - "5434:5432"
    volumes:
      - avenuegrill-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avenuegrill -d avenuegrill"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: avenuegrill-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  avenuegrill-pgdata:
