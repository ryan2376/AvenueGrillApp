spring:
  application:
    name: avenue-grill-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/avenuegrill}
    username: ${DATABASE_USERNAME:avenuegrill}
    password: ${DATABASE_PASSWORD:avenuegrill}

  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never auto-generated
    open-in-view: false
    # NOTE: We deliberately do NOT set hibernate.jdbc.time_zone. Timestamps use
    # `timestamptz`/`Instant` (inherently UTC), and forcing UTC shifts TIME columns
    # (store open/close hours) by the JVM offset. EAT display is handled in the app.

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application-specific config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Payments are wired in Phase 4 via a provider-agnostic layer (see docs/08).
  payments:
    provider: ${PAYMENT_PROVIDER:none}   # none | aggregator | jenga | daraja
